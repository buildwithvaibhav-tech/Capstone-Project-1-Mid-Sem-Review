<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol: Activity Analyzer</title>
    <link rel="stylesheet" href="style1.css">
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="style3.css">
</head>
<body>
    <div class="page">
        <h1>Daily Protocol and Efficiency Analyzer</h1>

        <div class="main-container">
            <div class="left-panel">
                <div class="welcome-panel">
                    <h2>Welcome</h2>
                    <p class="welcome-text">Operator: User</p>
                    <p class="quote-text">Stay consistent. Small steps still count.</p>
                    <button id="themeButton" type="button">Dark Mode</button>
                </div>

                <div class="calendar-section">
                    <h2>Select Date</h2>
                    <label for="jumpToDate">Date</label>
                    <input type="date" id="jumpToDate">
                </div>

                <div class="input-container">
                    <h2>Add Activity</h2>

                    <div class="input-group">
                        <label for="activityName">Activity Name</label>
                        <input type="text" id="activityName" placeholder="Enter activity name">
                    </div>

                    <div class="input-group">
                        <label for="activityCategory">Category</label>
                        <select id="activityCategory">
                            <option value="Deep Work">Deep Work</option>
                            <option value="Shallow Work">Shallow Work</option>
                        </select>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label for="hours">Hours</label>
                            <input type="number" id="hours" placeholder="0" min="0" max="23">
                        </div>

                        <div class="input-group">
                            <label for="minutes">Minutes</label>
                            <input type="number" id="minutes" placeholder="0" min="0" max="59">
                        </div>

                        <div class="input-group">
                            <label for="startTime">Start Time</label>
                            <input type="time" id="startTime">
                        </div>
                    </div>

                    <p id="formMessage" class="form-message"></p>

                    <button id="logButton" type="button">Log Activity</button>
                </div>
            </div>

            <div class="right-panel">
                <div class="activities-section">
                    <h2>Activity Log</h2>
                    <ul id="activityList" class="activity-list">
                        <li class="empty-item">No activities added yet.</li>
                    </ul>
                </div>

                <div class="analytics-section">
                    <h2>Performance Metrics</h2>

                    <div class="stats-container">
                        <div class="stat-box">
                            <h3>Total Tasks</h3>
                            <p id="totalTasks" class="stat-value">0</p>
                        </div>

                        <div class="stat-box">
                            <h3>Total Time</h3>
                            <p id="totalTime" class="stat-value">0h 0m</p>
                        </div>

                        <div class="stat-box">
                            <h3>Efficiency</h3>
                            <p id="efficiency" class="stat-value">0%</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
